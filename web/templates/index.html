<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>进程推理引擎</title>
    <link rel="stylesheet" href="/static/style.css?v=2">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%233498db' width='100' height='100' rx='20'/><text x='50' y='65' text-anchor='middle' font-size='50' fill='white' font-family='Arial'>IE</text></svg>">
</head>
<body>
    <div class="container">
        <header>
            <h1>Inference Engine</h1>
            <p class="subtitle">进程发展推理平台</p>
        </header>

        <nav class="main-nav">
            <a href="/" class="active">首页</a>
            <a href="/inference">创建推理</a>
            <a href="/history">历史记录</a>
        </nav>

        <main class="hero">
            <div class="hero-content">
                <h2>探索「如果...会怎样」</h2>
                <p>输入你的假设，让AI帮你推演未来的可能性</p>
                
                <div class="examples">
                    <h3>示例场景</h3>
                    <div class="example-grid">
                        <div class="example-card" onclick="loadExample('history')">
                            <span class="icon">📚</span>
                            <h4>历史推演</h4>
                            <p>如果扶苏继位，秦朝会怎样发展？</p>
                        </div>
                        <div class="example-card" onclick="loadExample('business')">
                            <span class="icon">📊</span>
                            <h4>商业预测</h4>
                            <p>如果公司坚持自主研发，未来会怎样？</p>
                        </div>
                        <div class="example-card" onclick="loadExample('tech')">
                            <span class="icon">⚡</span>
                            <h4>技术发展</h4>
                            <p>如果AI持续发展，编程会变成什么样？</p>
                        </div>
                        <div class="example-card" onclick="loadExample('personal')">
                            <span class="icon">🎯</span>
                            <h4>个人决策</h4>
                            <p>如果我选择创业，3年后会怎样？</p>
                        </div>
                    </div>
                </div>

                <div class="cta">
                    <a href="/inference" class="btn-primary">开始推理</a>
                </div>
            </div>
        </main>

        <section class="features">
            <h2>核心功能</h2>
            <div class="feature-grid">
                <div class="feature">
                    <span class="feature-icon">⚙</span>
                    <h3>多步推理</h3>
                    <p>分步骤推演进程发展</p>
                </div>
                <div class="feature">
                    <span class="feature-icon">↔</span>
                    <h3>多方案对比</h3>
                    <p>生成多种发展路径</p>
                </div>
                <div class="feature">
                    <span class="feature-icon">◈</span>
                    <h3>多模型支持</h3>
                    <p>支持22种大模型</p>
                </div>
                <div class="feature">
                    <span class="feature-icon">◉</span>
                    <h3>可视化展示</h3>
                    <p>清晰的推理结果</p>
                </div>
            </div>
        </section>
    </div>

    <script>
        function loadExample(type) {
            window.location.href = '/inference?example=' + type;
        }
    </script>
</body>
</html>
