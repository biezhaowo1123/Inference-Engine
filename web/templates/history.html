<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>推理历史 - 进程推理引擎</title>
    <link rel="stylesheet" href="/static/style.css?v=2">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
    <style>
        .history-section {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 25px;
            border: 1px solid var(--border);
        }
        
        .history-header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .history-header-bar h2 {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 0;
        }
        
        .btn-clear {
            background: var(--danger);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        .btn-clear:hover {
            opacity: 0.9;
        }
        
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .history-item {
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 15px;
            transition: all 0.2s;
            position: relative;
        }
        
        .history-item:hover {
            border-color: var(--primary);
        }
        
        .history-item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        
        .history-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-main);
            flex: 1;
        }
        
        .history-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .btn-delete {
            background: transparent;
            color: var(--text-light);
            border: 1px solid var(--border);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-delete:hover {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
        }
        
        .history-status {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        .status-completed {
            background: #e8f5e9;
            color: var(--success);
        }
        
        .status-processing {
            background: #fff8e1;
            color: var(--warning);
        }
        
        .status-failed {
            background: #ffebee;
            color: var(--danger);
        }
        
        .history-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 0.85rem;
            color: var(--text-light);
        }
        
        .history-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .history-domain {
            display: inline-block;
            padding: 2px 8px;
            background: #e3f2fd;
            border-radius: 4px;
            font-size: 0.75rem;
            color: var(--primary);
        }
        
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-light);
        }
        
        .empty-state svg {
            width: 60px;
            height: 60px;
            margin-bottom: 15px;
            opacity: 0.4;
        }
        
        .empty-state p {
            margin-bottom: 15px;
            font-size: 0.95rem;
        }
        
        .btn-new {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 10px 25px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        
        .btn-new:hover {
            background: var(--primary-dark);
        }
        
        .loading-state {
            text-align: center;
            padding: 30px;
            color: var(--text-light);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Inference Engine</h1>
            <p class="subtitle">进程发展推理平台</p>
        </header>

        <nav class="main-nav">
            <a href="/">首页</a>
            <a href="/inference">创建推理</a>
            <a href="/history" class="active">历史记录</a>
        </nav>

        <section class="history-section">
            <div class="history-header-bar">
                <h2>推理历史</h2>
                <button class="btn-clear" onclick="clearAllHistory()" id="clearBtn" style="display:none;">清空全部</button>
            </div>
            
            <div id="history-list" class="history-list">
                <div class="loading-state">加载中...</div>
            </div>
        </section>
    </div>
    
    <script>
        let historyData = [];
        
        async function loadHistory() {
            try {
                const response = await fetch('/api/history');
                const data = await response.json();
                
                if (data.success && data.data && data.data.length > 0) {
                    historyData = data.data;
                    renderHistory(data.data);
                    document.getElementById('clearBtn').style.display = 'inline-block';
                } else {
                    renderEmpty();
                    document.getElementById('clearBtn').style.display = 'none';
                }
            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('history-list').innerHTML = `
                    <div class="empty-state">
                        <p>加载失败，请刷新页面重试</p>
                    </div>
                `;
            }
        }
        
        function renderHistory(tasks) {
            const container = document.getElementById('history-list');
            
            if (!tasks || tasks.length === 0) {
                renderEmpty();
                return;
            }
            
            container.innerHTML = tasks.map(task => `
                <div class="history-item" id="task-${task.id}">
                    <div class="history-item-header">
                        <div class="history-title">${escapeHtml(task.title || '未命名任务')}</div>
                        <div class="history-actions">
                            <span class="history-status status-${task.status}">${getStatusText(task.status)}</span>
                            <button class="btn-delete" onclick="deleteTask(${task.id})">删除</button>
                        </div>
                    </div>
                    <div class="history-meta">
                        <span><span class="history-domain">${escapeHtml(task.domain || '未知')}</span></span>
                        <span>${escapeHtml(task.subject || '未知主体')}</span>
                        <span>${task.steps_count || 0} 步</span>
                        <span>${escapeHtml(task.model_used || '未知模型')}</span>
                        <span>${formatDate(task.created_at)}</span>
                    </div>
                </div>
            `).join('');
        }
        
        function renderEmpty() {
            document.getElementById('history-list').innerHTML = `
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                    </svg>
                    <p>暂无推理记录</p>
                    <a href="/inference" class="btn-new">开始第一次推理</a>
                </div>
            `;
        }
        
        async function deleteTask(id) {
            if (!confirm('确定要删除这条记录吗？')) {
                return;
            }
            
            try {
                const response = await fetch('/api/history/' + id, {
                    method: 'DELETE'
                });
                const data = await response.json();
                
                if (data.success) {
                    const element = document.getElementById('task-' + id);
                    if (element) {
                        element.style.transition = 'all 0.3s';
                        element.style.opacity = '0';
                        element.style.transform = 'translateX(-20px)';
                        setTimeout(() => {
                            element.remove();
                            if (document.querySelectorAll('.history-item').length === 0) {
                                renderEmpty();
                                document.getElementById('clearBtn').style.display = 'none';
                            }
                        }, 300);
                    }
                } else {
                    alert('删除失败: ' + (data.error || '未知错误'));
                }
            } catch (error) {
                alert('删除失败: ' + error.message);
            }
        }
        
        async function clearAllHistory() {
            if (!confirm('确定要清空所有历史记录吗？此操作不可恢复！')) {
                return;
            }
            
            try {
                const response = await fetch('/api/history', {
                    method: 'DELETE'
                });
                const data = await response.json();
                
                if (data.success) {
                    renderEmpty();
                    document.getElementById('clearBtn').style.display = 'none';
                } else {
                    alert('清空失败: ' + (data.error || '未知错误'));
                }
            } catch (error) {
                alert('清空失败: ' + error.message);
            }
        }
        
        function getStatusText(status) {
            const statusMap = {
                'completed': '已完成',
                'processing': '进行中',
                'failed': '失败'
            };
            return statusMap[status] || status;
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN', {
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        loadHistory();
    </script>
</body>
</html>
